version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - APP_TIMEZONE=America/Toronto
      - TZ=America/Toronto
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""          # empty = same-origin (nginx proxies /api/)
    depends_on:
      - backend
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Toronto
