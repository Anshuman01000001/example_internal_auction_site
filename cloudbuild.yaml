# ─── Google Cloud Build ──────────────────────────────────────
# Builds both images and deploys them to Cloud Run.
#
# Prerequisites:
#   1. Enable Cloud Run API & Cloud Build API in your GCP project.
#   2. Create an Artifact Registry Docker repo (e.g. "auction-app").
#   3. Set these substitutions (or pass via --substitution):
#        _REGION           – e.g. us-central1
#        _ARTIFACT_REPO    – e.g. auction-app
#        _MONGODB_URI      – your MongoDB Atlas connection string
#        _MONGODB_DB_NAME  – database name
#
# Run manually:
#   gcloud builds submit --config cloudbuild.yaml

substitutions:
  _REGION: northamerica-northeast2
  _ARTIFACT_REPO: auction-repo
  _BACKEND_URL: https://auction-backend-504158932657.northamerica-northeast2.run.app
  _MONGODB_URI: mongodb+srv://Admin:FFQRadminPW420@cluster0.aswibgx.mongodb.net/?appName=Cluster0
  _MONGODB_DB_NAME: testing

steps:
  # ── 1. Build backend image ────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/backend:$SHORT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/backend:latest"
      - "./backend"

  # ── 2. Build frontend image ───────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "VITE_API_BASE_URL=${_BACKEND_URL}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/frontend:$SHORT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/frontend:latest"
      - "./frontend"

  # ── 3. Push backend image ─────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/backend"

  # ── 4. Push frontend image ────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/frontend"

  # ── 5. Deploy backend to Cloud Run ────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "auction-backend"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/backend:$SHORT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8000"
      - "--set-env-vars"
      - "MONGODB_URI=${_MONGODB_URI},MONGODB_DB_NAME=${_MONGODB_DB_NAME},APP_TIMEZONE=America/Toronto,AUTH_USE_HTTPONLY_COOKIE=false,AUTH_COOKIE_SECURE=false,CORS_ALLOW_ORIGINS=https://auction-frontend-504158932657.northamerica-northeast2.run.app"

  # ── 6. Deploy frontend to Cloud Run ───────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "auction-frontend"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/frontend:$SHORT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/backend:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/frontend:$SHORT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
